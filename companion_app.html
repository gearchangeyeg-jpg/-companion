<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="コンパニオン管理">
<meta name="theme-color" content="#534AB7">
<title>コンパニオン管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f7;--card:#fff;--border:#e5e5e5;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --green:#1D9E75;--green-light:#E1F5EE;
  --orange:#BA7517;--orange-light:#FAEEDA;
  --red:#D4537E;--red-light:#FBEAF0;
  --blue:#378ADD;--blue-light:#E6F1FB;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
.screen{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);}
.topbar{background:var(--card);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:calc(12px + env(safe-area-inset-top));}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);}
.topbar-btn{background:transparent;border:none;cursor:pointer;color:var(--text2);padding:4px;font-size:22px;}
.sync-bar{padding:5px 16px;font-size:11px;display:flex;align-items:center;gap:6px;background:var(--purple-light);color:var(--purple-dark);flex-shrink:0;}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;}
.page.active{display:block;}
.sa{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.stat{background:var(--card);border-radius:12px;padding:12px 14px;border:0.5px solid var(--border);}
.slbl{font-size:11px;color:var(--text2);margin-bottom:4px;}
.sval{font-size:22px;font-weight:600;color:var(--text);}
.ssub{font-size:10px;margin-top:2px;}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:12px 14px;}
.chtitle{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);}
.row:last-child{border-bottom:none;}
.rm{font-size:14px;color:var(--text);}
.rs{font-size:11px;color:var(--text2);margin-top:2px;}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;white-space:nowrap;border:none;}
.bs{background:var(--green-light);color:var(--green);}
.bw{background:var(--orange-light);color:var(--orange);}
.bd{background:var(--red-light);color:var(--red);}
.bi{background:var(--blue-light);color:var(--blue);}
.bp{background:var(--purple-light);color:var(--purple-dark);}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.nc{display:flex;align-items:center;gap:10px;}
.fab{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--purple);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;width:100%;}
.fab:active{opacity:0.8;}
.fab:disabled{opacity:0.5;}
.slbl-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.06em;padding:2px 0;}
.bnav{display:flex;border-top:0.5px solid var(--border);background:var(--card);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;cursor:pointer;border:none;background:transparent;font-family:inherit;}
.bn i{font-size:22px;color:var(--text3);}
.bn span{font-size:9px;color:var(--text3);}
.bn.on i,.bn.on span{color:var(--purple);}
.fg{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;font-size:14px;border:0.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-family:inherit;-webkit-appearance:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--purple);}
.fg textarea{resize:none;height:60px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.sub-btn{background:transparent;border:0.5px solid var(--border);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;color:var(--text2);font-family:inherit;width:100%;}
.order-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);}
.order-row:last-child{border-bottom:none;}
.prog-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:3px;}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.chip{font-size:12px;padding:7px 14px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;}
.chip.on{background:var(--purple-light);border-color:#AFA9EC;color:var(--purple-dark);font-weight:600;}
.detail-panel{display:none;padding:8px 0 4px;border-top:0.5px solid var(--border);margin-top:4px;}
.detail-panel.open{display:block;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:24px;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:24px 12px;color:var(--text3);font-size:13px;line-height:1.8;}
.action-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;border:none;font-family:inherit;font-weight:600;margin-right:6px;margin-top:6px;}
</style>
</head>
<body>
<div class="screen">
<div class="topbar">
  <span class="topbar-title" id="ptitle">✨ コンパニオン管理</span>
  <button class="topbar-btn" onclick="openForm('booking')" aria-label="新規登録"><i class="ti ti-plus"></i></button>
</div>
<div class="sync-bar"><i class="ti ti-device-floppy"></i><span id="sync-msg">読み込み中...</span></div>

<div class="main">

<div class="page active" id="p-home">
<div class="sa">
  <div class="stat-row">
    <div class="stat"><div class="slbl">📅 今月予約</div><div class="sval" id="s-booking">0件</div></div>
    <div class="stat"><div class="slbl">💴 今月売上</div><div class="sval" id="s-sales">¥0</div></div>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="slbl">👩 稼働中</div><div class="sval" id="s-staff">0名</div></div>
    <div class="stat"><div class="slbl">⏳ 返事待ち</div><div class="sval" id="s-waiting">0件</div><div class="ssub" id="s-waitingsub"></div></div>
  </div>
  <div class="slbl-sec">直近の予約</div>
  <div class="card" id="home-bookings"><div class="empty">＋ から予約を登録しましょう</div></div>
  <div class="slbl-sec">返事待ちオーダー</div>
  <div class="card" id="home-waiting"><div class="empty" style="color:var(--green)">✅ 返事待ちなし</div></div>
</div>
</div>

<div class="page" id="p-booking">
<div class="sa">
  <button class="fab" onclick="openForm('booking')"><i class="ti ti-plus"></i> 新規予約を登録</button>
  <div class="slbl-sec">予約一覧</div>
  <div class="card" id="booking-list"><div class="empty">まだ予約がありません</div></div>
</div>
</div>

<div class="page" id="p-order">
<div class="sa">
  <button class="fab" onclick="openForm('order','')"><i class="ti ti-send"></i> 新規オーダーを打診</button>
  <div class="slbl-sec">打診履歴</div>
  <div class="card" id="order-list"><div class="empty">まだ打診履歴がありません</div></div>
</div>
</div>

<div class="page" id="p-staff">
<div class="sa">
  <button class="fab" onclick="openForm('staff','')"><i class="ti ti-plus"></i> スタッフを追加</button>
  <div class="slbl-sec">スタッフ一覧</div>
  <div class="card" id="staff-list"><div class="empty">スタッフを追加してください</div></div>
  <div class="slbl-sec">今月の稼働数</div>
  <div class="card" id="staff-progress"><div class="empty">データなし</div></div>
</div>
</div>

<div class="page" id="p-form">
<div class="fg" id="form-booking" style="display:none">
  <div style="font-size:16px;font-weight:600">新規予約登録</div>
  <div><label>依頼主</label><input id="f-client" type="text" placeholder="例：山田商事 / 鈴木様"></div>
  <div class="g2"><div><label>開始日時</label><input id="f-start" type="datetime-local"></div><div><label>終了予定</label><input id="f-end" type="time"></div></div>
  <div><label>会場</label><input id="f-venue" type="text" placeholder="例：ホテルグランド"></div>
  <div class="g2"><div><label>人数</label><input id="f-count" type="number" placeholder="3" min="1"></div><div><label>基本料金(円)</label><input id="f-price" type="number" placeholder="90000"></div></div>
  <div><label>状態</label><select id="f-status"><option>確定</option><option>仮押さえ</option><option>交渉中</option></select></div>
  <div><label>メモ</label><textarea id="f-memo" placeholder="備考など"></textarea></div>
  <button class="fab" onclick="submitBooking()"><i class="ti ti-check"></i> 登録する</button>
  <button class="sub-btn" onclick="cancelForm()">キャンセル</button>
</div>

<div class="fg" id="form-order" style="display:none">
  <div style="font-size:16px;font-weight:600">オーダー打診</div>
  <div><label>予約</label><select id="o-bid"></select></div>
  <div><label>スタッフ</label><select id="o-staff"></select></div>
  <div><label>打診方法</label><div class="chip-row" id="chip-method"><div class="chip on" onclick="pickChip(this,'chip-method')">LINE</div><div class="chip" onclick="pickChip(this,'chip-method')">電話</div><div class="chip" onclick="pickChip(this,'chip-method')">SMS</div></div></div>
  <div><label>返答期限</label><input id="o-deadline" type="datetime-local"></div>
  <div><label>返答結果</label><div class="chip-row" id="chip-result"><div class="chip on" onclick="pickChip(this,'chip-result')">返事待ち</div><div class="chip" onclick="pickChip(this,'chip-result')">OK</div><div class="chip" onclick="pickChip(this,'chip-result')">NG</div></div></div>
  <div><label>断り理由（NG時）</label><input id="o-reason" type="text" placeholder="例：先約あり"></div>
  <button class="fab" onclick="submitOrder()"><i class="ti ti-send"></i> 打診を記録</button>
  <button class="sub-btn" onclick="cancelForm()">キャンセル</button>
</div>

<div class="fg" id="form-extend" style="display:none">
  <div style="font-size:16px;font-weight:600">延長記録</div>
  <div><label>予約</label><select id="e-bid"></select></div>
  <div><label>スタッフ</label><select id="e-staff"></select></div>
  <div><label>実際の終了時刻</label><input id="e-end" type="time"></div>
  <div><label>延長（タップで選択）</label><div class="chip-row" id="chip-ext"><div class="chip" onclick="pickExt(this,30)">+30分</div><div class="chip" onclick="pickExt(this,60)">+60分</div><div class="chip" onclick="pickExt(this,90)">+90分</div><div class="chip" onclick="pickExt(this,120)">+120分</div></div></div>
  <div><label>単価(円/30分)</label><input id="e-rate" type="number" value="5000" oninput="calcExt()"></div>
  <div style="background:var(--bg);border-radius:10px;padding:12px 14px;"><div style="font-size:11px;color:var(--text2)">延長料金（自動計算）</div><div style="font-size:22px;font-weight:600;margin-top:4px" id="ext-calc">¥0</div></div>
  <button class="fab" onclick="submitExtend()"><i class="ti ti-check"></i> 記録する</button>
  <button class="sub-btn" onclick="cancelForm()">キャンセル</button>
</div>

<div class="fg" id="form-transport" style="display:none">
  <div style="font-size:16px;font-weight:600">交通費入力</div>
  <div><label>予約</label><select id="t-bid"></select></div>
  <div><label>スタッフ</label><select id="t-staff"></select></div>
  <div><label>交通手段</label><div class="chip-row" id="chip-trans"><div class="chip on" onclick="pickChip(this,'chip-trans')">電車</div><div class="chip" onclick="pickChip(this,'chip-trans')">タクシー</div><div class="chip" onclick="pickChip(this,'chip-trans')">バス</div><div class="chip" onclick="pickChip(this,'chip-trans')">その他</div></div></div>
  <div><label>実費(円)</label><input id="t-amount" type="number" placeholder="1500"></div>
  <div><label>備考</label><input id="t-memo" type="text" placeholder="例：遠方・深夜割増"></div>
  <div><label>精算</label><div class="chip-row" id="chip-paid"><div class="chip on" onclick="pickChip(this,'chip-paid')">未精算</div><div class="chip" onclick="pickChip(this,'chip-paid')">精算済み</div></div></div>
  <button class="fab" onclick="submitTransport()"><i class="ti ti-check"></i> 記録する</button>
  <button class="sub-btn" onclick="cancelForm()">キャンセル</button>
</div>

<div class="fg" id="form-staff" style="display:none">
  <div style="font-size:16px;font-weight:600">スタッフ追加</div>
  <div><label>名前</label><input id="st-name" type="text" placeholder="例：佐藤 りな"></div>
  <div><label>電話番号</label><input id="st-tel" type="tel" placeholder="090-xxxx-xxxx"></div>
  <div><label>基本単価(円/件)</label><input id="st-rate" type="number" placeholder="8000"></div>
  <div><label>状態</label><div class="chip-row" id="chip-ststate"><div class="chip on" onclick="pickChip(this,'chip-ststate')">稼働中</div><div class="chip" onclick="pickChip(this,'chip-ststate')">休暇中</div><div class="chip" onclick="pickChip(this,'chip-ststate')">引退</div></div></div>
  <button class="fab" onclick="submitStaff()"><i class="ti ti-check"></i> 追加する</button>
  <button class="sub-btn" onclick="cancelForm()">キャンセル</button>
</div>
</div>
</div>

<div class="bnav">
  <button class="bn on" id="bn-home" onclick="goTab('home')"><i class="ti ti-home"></i><span>ホーム</span></button>
  <button class="bn" id="bn-booking" onclick="goTab('booking')"><i class="ti ti-calendar"></i><span>予約</span></button>
  <button class="bn" id="bn-order" onclick="goTab('order')"><i class="ti ti-send"></i><span>オーダー</span></button>
  <button class="bn" id="bn-staff" onclick="goTab('staff')"><i class="ti ti-users"></i><span>スタッフ</span></button>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
var cur='home',prev='home',extMins=0;
var titles={home:'✨ コンパニオン管理',booking:'📅 予約管理',order:'📞 オーダー管理',staff:'👩 スタッフ管理',form:'入力フォーム'};
var avCols=[{bg:'#EEEDFE',fg:'#3C3489'},{bg:'#E1F5EE',fg:'#085041'},{bg:'#FAEEDA',fg:'#633806'},{bg:'#FBEAF0',fg:'#72243E'},{bg:'#E6F1FB',fg:'#0C447C'},{bg:'#FAECE7',fg:'#712B13'}];
var pCols=['#534AB7','#1D9E75','#BA7517','#D4537E','#378ADD'];
var DB={bookings:[],orders:[],extends:[],staff:[]};

function save(){try{localStorage.setItem('companion-db',JSON.stringify(DB));}catch(e){}}
function load(){try{var d=localStorage.getItem('companion-db');if(d)DB=JSON.parse(d);}catch(e){}document.getElementById('sync-msg').textContent='スマホ内に保存済み';renderAll();}
function newId(p){return p+'-'+String(Date.now()).slice(-5);}
function av(n,i){var c=avCols[i%avCols.length];return '<div class="av" style="background:'+c.bg+';color:'+c.fg+'">'+(n||'?').charAt(0)+'</div>';}
function bdg(s){if(!s)return '';if(s==='確定'||s==='OK')return '<span class="badge bs">'+s+'</span>';if(s==='仮押さえ'||s==='返事待ち')return '<span class="badge bw">'+s+'</span>';if(s==='キャンセル'||s==='NG')return '<span class="badge bd">'+s+'</span>';if(s==='交渉中')return '<span class="badge bi">'+s+'</span>';return '<span class="badge bp">'+s+'</span>';}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

function goTab(t){document.getElementById('p-'+cur).classList.remove('active');document.getElementById('p-'+t).classList.add('active');document.querySelectorAll('.bn').forEach(function(b){b.classList.remove('on');});var bn=document.getElementById('bn-'+t);if(bn)bn.classList.add('on');document.getElementById('ptitle').textContent=titles[t]||'';prev=cur;cur=t;}

function openForm(type,bid){
  prev=cur;document.getElementById('p-'+cur).classList.remove('active');document.getElementById('p-form').classList.add('active');
  document.querySelectorAll('.bn').forEach(function(b){b.classList.remove('on');});
  document.getElementById('ptitle').textContent='入力フォーム';cur='form';
  ['booking','order','extend','transport','staff'].forEach(function(f){document.getElementById('form-'+f).style.display='none';});
  document.getElementById('form-'+type).style.display='flex';
  ['o-bid','e-bid','t-bid'].forEach(function(id){var sel=document.getElementById(id);if(sel)sel.innerHTML=DB.bookings.map(function(b){return '<option value="'+b.id+'">'+b.id+' '+b.client+'</option>';}).join('')||'<option value="">（予約なし）</option>';});
  ['o-staff','e-staff','t-staff'].forEach(function(id){var sel=document.getElementById(id);if(sel)sel.innerHTML=DB.staff.map(function(s){return '<option>'+s.name+'</option>';}).join('')||'<option>（スタッフなし）</option>';});
  if(bid){['o-bid','e-bid','t-bid'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=bid;});}
  extMins=0;document.getElementById('ext-calc').textContent='¥0';
  document.querySelectorAll('#chip-ext .chip').forEach(function(c){c.classList.remove('on');});
}
function cancelForm(){document.getElementById('p-form').classList.remove('active');var t=prev||'home';document.getElementById('p-'+t).classList.add('active');var bn=document.getElementById('bn-'+t);if(bn)bn.classList.add('on');document.getElementById('ptitle').textContent=titles[t]||'';cur=t;}
function pickChip(el,g){document.getElementById(g).querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});el.classList.add('on');}
function pickExt(el,m){document.querySelectorAll('#chip-ext .chip').forEach(function(c){c.classList.remove('on');});el.classList.add('on');extMins=m;calcExt();}
function calcExt(){var r=parseInt(document.getElementById('e-rate').value)||5000;document.getElementById('ext-calc').textContent='¥'+((extMins/30)*r).toLocaleString();}

function submitBooking(){var c=document.getElementById('f-client').value;if(!c){toast('依頼主を入力してください');return;}var b={id:newId('YY'),client:c,startTime:document.getElementById('f-start').value,endTime:document.getElementById('f-end').value,venue:document.getElementById('f-venue').value,count:document.getElementById('f-count').value,price:Number(document.getElementById('f-price').value)||0,status:document.getElementById('f-status').value,memo:document.getElementById('f-memo').value,extFee:0,transFee:0};DB.bookings.push(b);save();toast('予約登録しました！ '+b.id);cancelForm();renderAll();}
function submitOrder(){var bid=document.getElementById('o-bid').value;if(!bid){toast('予約を選んでください');return;}var o={bookingId:bid,staffName:document.getElementById('o-staff').value,method:document.querySelector('#chip-method .chip.on').textContent,deadline:document.getElementById('o-deadline').value,result:document.querySelector('#chip-result .chip.on').textContent,reason:document.getElementById('o-reason').value,time:new Date().toLocaleString('ja-JP')};DB.orders.push(o);save();toast('オーダーを記録しました');cancelForm();renderAll();}
function submitExtend(){var bid=document.getElementById('e-bid').value;if(!bid){toast('予約を選んでください');return;}if(!extMins){toast('延長時間を選んでください');return;}var r=parseInt(document.getElementById('e-rate').value)||5000;var fee=(extMins/30)*r;DB.extends.push({bookingId:bid,staffName:document.getElementById('e-staff').value,actualEnd:document.getElementById('e-end').value,mins:extMins,fee:fee});var bk=DB.bookings.find(function(b){return b.id===bid;});if(bk)bk.extFee=(bk.extFee||0)+fee;save();toast('延長料金 ¥'+fee.toLocaleString()+' を記録');cancelForm();renderAll();}
function submitTransport(){var bid=document.getElementById('t-bid').value;if(!bid){toast('予約を選んでください');return;}var amt=Number(document.getElementById('t-amount').value)||0;DB.extends.push({bookingId:bid,staffName:document.getElementById('t-staff').value,type:document.querySelector('#chip-trans .chip.on').textContent,amount:amt,memo:document.getElementById('t-memo').value,paid:document.querySelector('#chip-paid .chip.on').textContent==='精算済み'});var bk=DB.bookings.find(function(b){return b.id===bid;});if(bk)bk.transFee=(bk.transFee||0)+amt;save();toast('交通費 ¥'+amt.toLocaleString()+' を記録');cancelForm();renderAll();}
function submitStaff(){var n=document.getElementById('st-name').value;if(!n){toast('名前を入力してください');return;}DB.staff.push({name:n,tel:document.getElementById('st-tel').value,rate:Number(document.getElementById('st-rate').value)||8000,state:document.querySelector('#chip-ststate .chip.on').textContent});save();toast(n+'を追加しました');cancelForm();renderAll();}

function renderAll(){renderStats();renderHomeBookings();renderHomeWaiting();renderBookingList();renderOrderList();renderStaffList();}
function renderStats(){var bk=DB.bookings||[];var or=DB.orders||[];var st=DB.staff||[];var conf=bk.filter(function(b){return b.status==='確定';});var sales=conf.reduce(function(s,b){return s+b.price+(b.extFee||0)+(b.transFee||0);},0);var wait=or.filter(function(o){return o.result==='返事待ち';});document.getElementById('s-booking').textContent=conf.length+'件';document.getElementById('s-sales').textContent=sales>=1000?'¥'+(sales/1000).toFixed(0)+'K':'¥'+sales.toLocaleString();document.getElementById('s-staff').textContent=st.filter(function(s){return s.state==='稼働中';}).length+'名';document.getElementById('s-waiting').textContent=wait.length+'件';document.getElementById('s-waitingsub').textContent=wait.length>0?'要フォロー':'問題なし';document.getElementById('s-waitingsub').style.color=wait.length>0?'var(--orange)':'var(--green)';}
function renderHomeBookings(){var el=document.getElementById('home-bookings');var bk=(DB.bookings||[]).slice(-4).reverse();if(!bk.length){el.innerHTML='<div class="empty">＋ から予約を登録しましょう</div>';return;}el.innerHTML=bk.map(function(b){return '<div class="row"><div style="flex:1"><div class="rm">'+b.client+'</div><div class="rs">'+(b.startTime||'日時未定')+(b.count?' · '+b.count+'名':'')+'</div></div>'+bdg(b.status)+'</div>';}).join('');}
function renderHomeWaiting(){var el=document.getElementById('home-waiting');var wait=(DB.orders||[]).filter(function(o){return o.result==='返事待ち';});if(!wait.length){el.innerHTML='<div class="empty" style="color:var(--green)">✅ 返事待ちなし</div>';return;}el.innerHTML=wait.map(function(o,i){return '<div class="order-row"><div class="nc">'+av(o.staffName,i)+'<div><div class="rm" style="font-size:13px">'+o.staffName+'</div><div class="rs">'+o.bookingId+' · 期限:'+(o.deadline||'未設定')+'</div></div></div><span class="badge bw">返事待ち</span></div>';}).join('');}
function renderBookingList(){var el=document.getElementById('booking-list');var bk=(DB.bookings||[]).slice().reverse();if(!bk.length){el.innerHTML='<div class="empty">まだ予約がありません</div>';return;}el.innerHTML=bk.map(function(b,i){var did='bd'+i;var total=b.price+(b.extFee||0)+(b.transFee||0);return '<div class="row" onclick="document.getElementById(\''+did+'\').classList.toggle(\'open\')"><div style="flex:1"><div class="rm">'+b.client+'</div><div class="rs">'+(b.startTime||'日時未定')+(b.count?' · '+b.count+'名':'')+'</div></div>'+bdg(b.status)+'<i class="ti ti-chevron-down" style="font-size:14px;color:var(--text3);margin-left:8px"></i></div><div class="detail-panel" id="'+did+'"><div style="font-size:12px;color:var(--text2);padding:4px 0 6px">会場：'+(b.venue||'未定')+'<br>合計：¥'+total.toLocaleString()+(b.extFee?' (延長+¥'+b.extFee.toLocaleString()+')')+(b.transFee?' (交通費+¥'+b.transFee.toLocaleString()+')')+'</div><div><button class="action-btn bp" onclick="openForm(\'order\',\''+b.id+'\')">📞 オーダー</button><button class="action-btn bs" onclick="openForm(\'extend\',\''+b.id+'\')">⏱ 延長</button><button class="action-btn bi" onclick="openForm(\'transport\',\''+b.id+'\')">🚗 交通費</button></div></div>';}).join('');}
function renderOrderList(){var el=document.getElementById('order-list');var or=(DB.orders||[]).slice().reverse();if(!or.length){el.innerHTML='<div class="empty">まだ打診履歴がありません</div>';return;}var grp={};or.forEach(function(o){if(!grp[o.bookingId])grp[o.bookingId]=[];grp[o.bookingId].push(o);});el.innerHTML=Object.keys(grp).map(function(bid){var bk=DB.bookings.find(function(b){return b.id===bid;});return '<div class="chtitle">'+bid+(bk?' '+bk.client:'')+'</div>'+grp[bid].map(function(o,i){return '<div class="order-row"><div class="nc">'+av(o.staffName,i)+'<div><div class="rm" style="font-size:13px">'+o.staffName+'</div><div class="rs">'+(o.reason||o.method||o.time||'')+'</div></div></div>'+bdg(o.result)+'</div>';}).join('');}).join('<div style="height:8px"></div>');}
function renderStaffList(){var st=DB.staff||[];var el=document.getElementById('staff-list');var ep=document.getElementById('staff-progress');if(!st.length){el.innerHTML='<div class="empty">スタッフを追加してください</div>';ep.innerHTML='';return;}st.forEach(function(s){s.count=DB.orders.filter(function(o){return o.staffName===s.name&&o.result==='OK';}).length;});el.innerHTML=st.map(function(s,i){return '<div class="row"><div class="nc">'+av(s.name,i)+'<div><div class="rm">'+s.name+'</div><div class="rs">'+s.count+'件 · ¥'+((s.count*s.rate)||0).toLocaleString()+' · '+s.tel+'</div></div></div>'+bdg(s.state)+'</div>';}).join('');var mx=Math.max.apply(null,st.map(function(s){return s.count||0;}));ep.innerHTML='<div style="display:flex;flex-direction:column;gap:10px;font-size:12px;">'+st.map(function(s,i){var p=mx>0?Math.round((s.count||0)/mx*100):0;return '<div><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span>'+s.name+'</span><span style="color:var(--text2)">'+(s.count||0)+'件</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+p+'%;background:'+pCols[i%pCols.length]+'"></div></div></div>';}).join('')+'</div>';}

load();
</script>
</body>
</html>
